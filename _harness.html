<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>body{margin:0;background:#2b2b2b}canvas{width:400px;height:520px;image-rendering:pixelated}</style></head>
<body>
<canvas id="c"></canvas>
<script>window.hasEnchants=()=>false;</script>
<script src="js/assets.js"></script>
<script src="js/viewer3d.js"></script>
<script>
const canvas=document.getElementById('c');
const v=createViewer(canvas); v.cam.auto=false;
const skin=document.createElement('canvas');skin.width=64;skin.height=64;
{const s=skin.getContext('2d');s.fillStyle='#8a94a8';s.fillRect(0,0,64,64);}
window.__setView=(yaw,pitch,dist)=>{v.cam.yaw=yaw;v.cam.pitch=pitch;if(dist)v.cam.dist=dist;canvas.__draw(0);canvas.__draw(0);};
window.__cap=(w)=>{const o=document.createElement('canvas');const r=canvas.height/canvas.width;o.width=w;o.height=Math.round(w*r);const x=o.getContext('2d');x.imageSmoothingEnabled=false;x.fillStyle='#2b2b2b';x.fillRect(0,0,o.width,o.height);x.drawImage(canvas,0,0,o.width,o.height);return o.toDataURL('image/png');};
window.__load=(armor)=>window.__ready=v.update({model:'wide',skinSrc:skin,armor}).then(()=>{canvas.__draw(0);canvas.__draw(0);return true;});
window.__load({head:{kind:'helmet',material:'turtle'}});
</script>
</body></html>
